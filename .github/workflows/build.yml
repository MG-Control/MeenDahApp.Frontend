name: Build Android APK
on:
  push:
    branches:
      - dev
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk/ndk-bundle
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo docker image prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm install

      - name: Read app version
        id: app_version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          CHANNEL=${{ github.ref_name == 'master' && '"stable"' || '"preview"' }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-${CHANNEL}-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build APK Locally
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx4096m -XX:MaxMetaspaceSize=1024m'"
        run: eas build --platform android --profile preview --local

      - name: Rename APK
        run: |
          APK=$(ls ./*.apk | head -n 1)
          mv "$APK" "./meendah-${{ steps.app_version.outputs.tag }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: ./meendah-${{ steps.app_version.outputs.tag }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.app_version.outputs.tag }}
          name: "MeenDah ${{ steps.app_version.outputs.version }} (${{ steps.app_version.outputs.channel }}) #${{ github.run_number }}"
          body: |
            **Channel:** ${{ steps.app_version.outputs.channel }}
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
          files: ./meendah-${{ steps.app_version.outputs.tag }}.apk
          prerelease: ${{ github.ref_name != 'master' }}
